[include mainsail.cfg]
[virtual_sdcard]
path: /home/rmarin/printer_data/gcodes
on_error_gcode: CANCEL_PRINT


[include toolhead.cfg]
[include stealthburner_leds.cfg]
#[include eddy.cfg]
[include macros.cfg]
[include extra_macro.cfg]
[include rgb_macros.cfg]
[include print_start.cfg]
[include KAMP_Settings.cfg]
[include Klicky-Probe/*]
[include AFC/*.cfg]


[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_330021000D50345033313820-if00

[stepper_x]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 64
rotation_distance: 40
endstop_pin: ^EBBCan: gpio22 #^PC0
position_endstop: 219
position_min: 0
position_max: 219
homing_speed: 60
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.58
hold_current: 0.500


[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 64
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 60
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 999999
diag_pin:^PC1
driver_SGTHRS: 80

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 64
rotation_distance: 40
# endstop_pin: ^PC2
# position_endstop: 0.0
endstop_pin: probe:z_virtual_endstop
position_min: -6
position_max: 170
homing_speed: 60

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.58
hold_current: 0.500
stealthchop_threshold: 999999
#----------- End Steppers -------------#


[bed_mesh]
horizontal_move_z: 8
speed: 250

mesh_min: 25, 25
mesh_max: 185, 195
probe_count: 3, 3
algorithm: bicubic


#----------- Extruder -----------------#
[extruder]
step_pin: EBBCan:gpio18
dir_pin: !EBBCan:gpio19
enable_pin: !EBBCan:gpio17
microsteps: 16
rotation_distance: 4.566
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:gpio7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan:gpio27
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 280
max_extrude_only_distance: 200
max_extrude_cross_section: 5
pressure_advance: 0.02
min_extrude_temp: 200
max_extrude_cross_section: 5

#[tmc2209 extruder]
#uart_pin: PC11
#tx_pin: PC10
#uart_address: 3
#run_current: 0.650
#hold_current: 0.500
#stealthchop_threshold: 999999
#-----------End Extruder --------------#

#------------ Hotbed ------------------#
[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

[heater_fan controller_fan]
pin: PB15
heater: heater_bed
heater_temp: 45.0

#[heater_fan nozzle_cooling_fan]
#pin: PC7

#[fan]
#pin: PC6
#------------- End Hotbed  ------------#


# serial: /dev/ttyAMA0
# restart_method: command

#------------- Printer ----------------#
[printer]
kinematics: corexz
max_velocity: 200
max_accel: 1000
minimum_cruise_ratio: 0.5
max_z_velocity: 50
max_z_accel: 1000
square_corner_velocity: 5.0
#------------- End Printer ------------#

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>


######################################################################
#  BigTreeTech TFT TouchScreen emulated 12864 mode
######################################################################

[display]
lcd_type: emulated_st7920
spi_software_miso_pin: PD8 # status led, Virtual MISO
spi_software_mosi_pin: PD6
spi_software_sclk_pin: PB9
en_pin: PB8
encoder_pins: ^PA10, ^PA9
click_pin: ^!PA15

[output_pin beeper]
pin: PB5
# Probe
[probe]
Pin: ^PC14
x_offset: 0.0
y_offset: 19.75
#z_offset: 6.17
speed: 5
lift_speed: 7
samples: 3
samples_result: median
sample_retract_dist: 2
samples_tolerance: 0.01
samples_tolerance_retries: 10

##############################################
# Servo

[servo klicky_servo]
#check were your servo is wired
pin: PA1
maximum_servo_angle: 180
minimum_pulse_width: 0.00025
maximum_pulse_width: 0.0024

[gcode_macro _servo_test_angle]
gcode:
	{% set ANGLE  = params.ANGLE|int %}
	
    SET_SERVO SERVO=klicky_servo ANGLE={ANGLE}
    G4 P250
    SET_SERVO SERVO=klicky_servo WIDTH=0.0


# Enable exclude_object for adaptive meshing
[exclude_object]



